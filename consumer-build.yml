name: Security Audit (on push)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

jobs:
  audit:
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
          - component: frontend
    uses: siahmurph/devops-templates/.github/workflows/security-audit-and-digest.yml@v1
    with:
      registry: ghcr.io
      image_name: fido2-${{ matrix.component }}
      image_tag: latest
      run_image_scan: true
    secrets: inherit
